worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_body;
    proxy_temp_path        /tmp/proxy_temp;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    access_log /var/log/nginx/access.log combined;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name _;

        # Health-check
        location = / {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── XHTTP IRL ─────────────────────────────────────────────
        location /xhttp-irl {
            proxy_pass http://52.31.243.236:8443;

            proxy_http_version 1.1;
            proxy_set_header Host 52.31.243.236;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;
        }

        # ── XHTTP EDGE ────────────────────────────────────────────
        location /xhttp-edge-220 {
            proxy_pass http://5.254.6.220:8443;

            proxy_http_version 1.1;
            proxy_set_header Host 5.254.6.220;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;
        }

        # ── WS IRL ────────────────────────────────────────────────
        location /ws-irl {
            proxy_pass http://52.31.243.236:8443;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host 52.31.243.236;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            proxy_buffering off;
        }

        # ── WS EDGE ───────────────────────────────────────────────
        location /ws-edge-220 {
            proxy_pass http://5.254.6.220:8443;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host 5.254.6.220;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            proxy_buffering off;
        }

                # ── WS EDGE ───────────────────────────────────────────────
        location /ws-edge-175 {
            proxy_pass http://5.254.6.175:8443;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host 5.254.6.220;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            proxy_buffering off;
        }

        # ── Origin fallback ───────────────────────────────────────
        location / {
            return 200;
            
        }
    }
}
